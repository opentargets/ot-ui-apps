query EncoreQuery($ensemblId: String!, $efoId: String!, $size: Int!) {
  disease(efoId: $efoId) {
    id
    otEncoreSummary: evidences(
      ensemblIds: [$ensemblId]
      enableIndirect: true
      datasourceIds: ["encore"]
      size: $size
    ) {
      count
      rows {
        target {
          id
          approvedSymbol
        }
        disease {
          id
          name
        }
        diseaseCellLines {
          name
          id
          tissue
          tissueId
        }
        biomarkerList {
          name
          description
        }
        targetRole
        interactingTargetRole
        cellType
        interactingTargetFromSourceId
        phenotypicConsequenceLogFoldChange
        phenotypicConsequencePValue
        geneticInteractionScore
        geneticInteractionFDR
        geneticInteractionType
        releaseVersion
        validationReadouts {
          isValidated
          readoutMethodName
          screen
        }
      }
    }
  }
}
