query ClinicalPrecedence($ensemblId: String!, $efoId: String!, $size: Int!) {
  disease(efoId: $efoId) {
    id
    clinical_precedence: evidences(
      ensemblIds: [$ensemblId]
      enableIndirect: true
      datasourceIds: ["clinical_precedence"]
      size: $size
    ) {
      count
      rows {
        disease {
          id
          name
        }
        target {
          id
          approvedSymbol
        }
        drug {
          id
          name
          mechanismsOfAction {
            rows {
              targets {
                id
                approvedSymbol
              }
            }
          }
        }
        directionOnTarget
        directionOnTrait
        clinicalStage
        clinicalReportId
        studyStartDate

      }
    }
  }
}