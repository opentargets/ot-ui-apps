query ClinicalRecordsQuery($clinicalReportsIds: [String!]!) {
  clinicalReports(clinicalReportsIds: $clinicalReportsIds) {
    clinicalStage
    id
    source
    trialLiterature
    trialOfficialTitle
    trialOverallStatus
    trialStartDate
    type  # !! CAN BE OMITTED ONCE ALWAYS HAVE TITLE
    year
  }
}